<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Healytica Record</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
</head>
<body class="welcome-page">
    <div class="video-background-container">
        <div class="video-overlay"></div>
    </div>

    <div class="logo-container">
        <div class="logo">H</div>
        <div class="logo-text">HEALYTICA RECORD</div>
        <div class="tagline">Reset Your Password</div>
    </div>

    <div class="main-auth-container">
        <div class="auth-card">
            <h2>Reset Password</h2>
            
            <div id="resetForm" class="auth-form active">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password (min. 6 chars)">
                </div>

                <div class="form-group">
                    <label for="confirmNewPassword">Confirm New Password</label>
                    <input type="password" id="confirmNewPassword" placeholder="Confirm your new password">
                </div>

                <button class="auth-btn primary" id="resetPasswordBtn">
                    <i class="fas fa-key"></i> RESET PASSWORD
                </button>

                <div class="auth-switch">
                    <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
                </div>
            </div>

            <div id="successMessage" class="auth-form" style="display: none;">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h3>Password Reset Successful!</h3>
                <p>Your password has been updated successfully.</p>
                <a href="index.html" class="auth-btn primary">
                    <i class="fas fa-sign-in-alt"></i> LOGIN NOW
                </a>
            </div>
        </div>
    </div>

    <div id="messageContainer"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const resetBtn = document.getElementById('resetPasswordBtn');
            const resetForm = document.getElementById('resetForm');
            const successMessage = document.getElementById('successMessage');
            
            // Get the access token from URL
            const urlParams = new URLSearchParams(window.location.hash.substring(1));
            const accessToken = urlParams.get('access_token');
            const type = urlParams.get('type');
            
            if (type !== 'recovery' || !accessToken) {
                showMessage('error', 'Invalid or expired reset link. Please request a new one.');
                resetBtn.disabled = true;
                return;
            }

            resetBtn.addEventListener('click', async function() {
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmNewPassword').value;

                if (!newPassword || !confirmPassword) {
                    showMessage('error', 'Please fill all fields');
                    return;
                }

                if (newPassword.length < 6) {
                    showMessage('error', 'Password must be at least 6 characters');
                    return;
                }

                if (newPassword !== confirmPassword) {
                    showMessage('error', 'Passwords do not match');
                    return;
                }

                resetBtn.disabled = true;
                resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> RESETTING...';

                try {
                    const { error } = await supabase.auth.updateUser({
                        password: newPassword
                    });

                    if (error) {
                        showMessage('error', 'Password reset failed: ' + error.message);
                        resetBtn.disabled = false;
                        resetBtn.innerHTML = '<i class="fas fa-key"></i> RESET PASSWORD';
                    } else {
                        // Show success message
                        resetForm.style.display = 'none';
                        successMessage.style.display = 'block';
                    }
                } catch (error) {
                    console.error('Reset error:', error);
                    showMessage('error', 'Password reset failed. Please try again.');
                    resetBtn.disabled = false;
                    resetBtn.innerHTML = '<i class="fas fa-key"></i> RESET PASSWORD';
                }
            });

            // Enter key support
            document.getElementById('confirmNewPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    resetBtn.click();
                }
            });
        });

        function showMessage(type, text) {
            const container = document.getElementById('messageContainer');
            if (!container) return;

            const message = document.createElement('div');
            message.className = `message ${type}`;
            
            const icon = type === 'success' ? '✅' : 
                        type === 'error' ? '❌' : 
                        type === 'warning' ? '⚠️' : 'ℹ️';
            
            message.innerHTML = `<span>${icon}</span> <span>${text}</span>`;
            
            container.appendChild(message);
            
            setTimeout(() => {
                message.style.opacity = '0';
                message.style.transform = 'translateX(100%)';
                setTimeout(() => {
                    if (message.parentNode) {
                        message.parentNode.removeChild(message);
                    }
                }, 300);
            }, 5000);
        }
    </script>
</body>
</html>

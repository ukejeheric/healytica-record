<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healytica Record - Your Health, Your Data</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Video background styles */
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        
        /* Video overlay for better text readability */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }
        
        /* Ensure content stays above video */
        .logo-container,
        .main-auth-container,
        #messageContainer {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body class="welcome-page">
    
    <!-- Video Overlay -->
    <div class="video-overlay"></div>
    
    <!-- Video Background - Using your local file -->
    <video id="video-background" autoplay muted loop playsinline>
        <!-- Try both paths - relative path and fallback to online video -->
        <source src="assets/welcome_note.mp4" type="video/mp4">
        <source src="welcome_note.mp4" type="video/mp4">
        <!-- Fallback to online video if local doesn't work -->
        <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-background-with-moving-lines-33471-large.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <!-- Logo Section -->
    <div class="logo-container">
        <div class="logo">H</div>
        <div class="logo-text">HEALYTICA RECORD</div>
        <div class="tagline">Your Health, Your Data, Your Control</div>
    </div>

    <!-- Main Auth Container -->
    <div class="main-auth-container">
        <div class="auth-card">
            <!-- Auth Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab">LOGIN</button>
                <button class="auth-tab" id="registerTab">REGISTER</button>
            </div>

            <!-- Login Form -->
            <div class="auth-form active" id="loginForm">
    <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" placeholder="Enter your email address">
    </div>

    <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
    </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="keepSignedIn">
                        <span>Keep me signed in</span>
                    </label>
                </div>

                <div class="forgot-password">
                    <a href="#" id="forgotPassword">Forgot Password?</a>
                </div>

                <button class="auth-btn primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> LOGIN
                </button>

                <div class="auth-switch">
                    Don't have an account? <a href="#" id="showRegister">REGISTER NOW</a>
                </div>
            </div>

            <!-- Register Form -->
            <div class="auth-form" id="registerForm">
    <div class="form-group">
        <label for="registerEmail">Email Address</label>
        <input type="email" id="registerEmail" placeholder="Enter your email address">
    </div>

    <div class="form-group">
        <label for="registerMobile">Mobile Number (Optional)</label>
        <input type="tel" id="registerMobile" placeholder="Enter your mobile number">
    </div>

    <div class="form-group">
        <label for="registerCountry">Country Code</label>
        <select id="registerCountry" class="country-select">
            <option value="+234">+234 Nigeria</option>
            <option value="+233">+233 Ghana</option>
            <option value="+254">+254 Kenya</option>
            <option value="+255">+255 Tanzania</option>
            <option value="+256">+256 Uganda</option>
            <option value="+27">+27 South Africa</option>
            <option value="+1">+1 USA/Canada</option>
            <option value="+44">+44 UK</option>
        </select>
    </div>

    <div class="form-group">
        <label for="registerPassword">Set Password</label>
        <input type="password" id="registerPassword" placeholder="Create a password (min. 6 chars)">
    </div>

    <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your password">
    </div>

                <button class="auth-btn primary" id="registerBtn">
                    <i class="fas fa-user-plus"></i> CREATE ACCOUNT
                </button>

                <div class="auth-switch">
                    Already have an account? <a href="#" id="showLogin">LOGIN HERE</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Message Container -->
    <div id="messageContainer"></div>

    <!-- Scripts -->
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    
    <!-- Initialize the app -->
    <script>
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded - initializing...');
            
            // Clear any previous auth redirect flags
            localStorage.removeItem('authRedirectAttempt');
            
            // Set up event listeners
            if (typeof setupAuthListeners === 'function') {
                console.log('Setting up auth listeners...');
                setupAuthListeners();
            } else {
                console.error('setupAuthListeners function not found!');
                // Load auth.js again if it failed
                const script = document.createElement('script');
                script.src = 'js/auth.js';
                script.onload = function() {
                    if (typeof setupAuthListeners === 'function') {
                        setupAuthListeners();
                    }
                };
                document.head.appendChild(script);
            }
            
            // Setup video background
            setupVideoBackground();
            
            // Check if we were redirected from another page
            const urlParams = new URLSearchParams(window.location.search);
            const redirectReason = urlParams.get('redirect');
            if (redirectReason === 'auth') {
                showMessage('warning', 'Please login to continue');
            }
        });
        
        // Video background setup function
        function setupVideoBackground() {
            console.log('Setting up video background...');
            
            const video = document.getElementById('video-background');
            if (!video) {
                console.error('Video element not found');
                return;
            }
            
            // Add error handling for video
            video.addEventListener('error', function(e) {
                console.error('Video error:', e);
                console.log('Video source tried:', video.currentSrc);
                
                // Try to load the fallback video
                const sources = video.querySelectorAll('source');
                let currentIndex = -1;
                
                // Find which source is currently failing
                for (let i = 0; i < sources.length; i++) {
                    if (sources[i].src === video.currentSrc) {
                        currentIndex = i;
                        break;
                    }
                }
                
                // Try next source if available
                if (currentIndex < sources.length - 1) {
                    console.log('Trying next video source...');
                    video.src = sources[currentIndex + 1].src;
                    video.load();
                } else {
                    console.log('All video sources failed, showing fallback background');
                    showFallbackBackground();
                }
            });
            
            // Add loaded event
            video.addEventListener('loadeddata', function() {
                console.log('Video loaded successfully:', video.currentSrc);
            });
            
            // Add waiting event
            video.addEventListener('waiting', function() {
                console.log('Video buffering...');
            });
            
            // Add playing event
            video.addEventListener('playing', function() {
                console.log('Video playing');
            });
            
            // Try to play the video (some browsers require this)
            video.play().catch(function(error) {
                console.warn('Autoplay prevented:', error);
                // Show play button or handle autoplay restrictions
            });
        }
        
        // Fallback background if video fails
        function showFallbackBackground() {
            const overlay = document.querySelector('.video-overlay');
            if (overlay) {
                overlay.style.background = 'linear-gradient(135deg, rgba(25, 118, 210, 0.9) 0%, rgba(156, 39, 176, 0.85) 100%)';
                overlay.style.zIndex = '-1';
            }
            
            // Hide the video element
            const video = document.getElementById('video-background');
            if (video) {
                video.style.display = 'none';
            }
        }
        
        // Global showMessage function (in case auth.js hasn't loaded yet)
        function showMessage(type, text) {
            const container = document.getElementById('messageContainer');
            if (!container) {
                console.log(`[${type.toUpperCase()}] ${text}`);
                return;
            }

            const message = document.createElement('div');
            message.className = `message ${type}`;
            
            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };
            
            message.innerHTML = `
                <span class="message-icon">${icons[type] || 'ℹ️'}</span>
                <span class="message-text">${text}</span>
            `;
            
            container.appendChild(message);
            
            setTimeout(() => {
                message.style.opacity = '0';
                setTimeout(() => {
                    if (message.parentNode) {
                        message.parentNode.removeChild(message);
                    }
                }, 300);
            }, 5000);
        }
        
        // Add this to handle auth state changes
        window.addEventListener('storage', function(e) {
            if (e.key === 'authState') {
                console.log('Auth state changed:', e.newValue);
                // Handle auth state changes if needed
            }
        });
    </script>
</body>
</html>
